<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SOP闯关游戏 - 石家庄明旺乳业</title>
<style>
:root {
  --bg: #1a1a2e;
  --bg2: #16213e;
  --card: #0f3460;
  --gold: #f0b90b;
  --gold2: #e6a800;
  --red: #e94560;
  --text: #e8e8f0;
  --text2: #b0b8d0;
  --text3: #7a85a0;
  --border: #1e5080;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, #0a1628 100%);
  color: var(--text);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  padding: 20px 16px;
  -webkit-tap-highlight-color: transparent;
}

.header {
  text-align: center;
  padding: 20px 0 16px;
}
.header .logo { font-size: 48px; margin-bottom: 8px; }
.header h1 {
  font-size: 26px;
  color: var(--gold);
  text-shadow: 0 0 20px rgba(240,185,11,0.3);
}
.header .sub {
  font-size: 13px;
  color: var(--text2);
  margin-top: 4px;
}

.promo {
  background: linear-gradient(135deg, rgba(240,185,11,0.12), rgba(233,69,96,0.12));
  border: 1px solid rgba(240,185,11,0.25);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
  text-align: center;
}
.promo .title {
  font-size: 17px;
  font-weight: bold;
  color: var(--gold);
  margin-bottom: 4px;
}
.promo .subtitle {
  font-size: 13px;
  color: var(--text2);
}
.promo .ranks {
  font-size: 26px;
  margin-top: 8px;
  letter-spacing: 4px;
}

.section-title {
  font-size: 16px;
  font-weight: bold;
  color: var(--gold);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.game-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}

.game-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  color: var(--text);
}
.game-card:active {
  transform: scale(0.98);
  border-color: var(--gold);
  background: rgba(240,185,11,0.08);
}
.game-card .icon {
  font-size: 32px;
  width: 44px;
  text-align: center;
  flex-shrink: 0;
}
.game-card .info { flex: 1; }
.game-card .name {
  font-size: 15px;
  font-weight: bold;
}
.game-card .desc {
  font-size: 11px;
  color: var(--text2);
  margin-top: 2px;
}
.game-card .badge {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 10px;
  font-weight: bold;
  flex-shrink: 0;
}
.badge-200 { background: rgba(240,185,11,0.2); color: var(--gold); }
.badge-150 { background: rgba(52,152,219,0.2); color: #3498db; }
.badge-100 { background: rgba(46,204,113,0.2); color: #2ecc71; }

.game-card .arrow { font-size: 20px; color: var(--text3); flex-shrink: 0; }

.footer {
  text-align: center;
  font-size: 11px;
  color: var(--text3);
  padding: 16px 0;
}

.stats-bar {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--text2);
}
.stats-bar span { color: var(--gold); font-weight: bold; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🏆</div>
  <h1>SOP闯关游戏</h1>
  <div class="sub">石家庄明旺乳业有限公司 · 岗位知识挑战赛</div>
</div>

<div class="promo">
  <div class="title">🥉 你是青铜还是王者？👑</div>
  <div class="subtitle">选择你的岗位，开始挑战 · 还有奖可拿！</div>
  <div class="ranks">🥉 🥈 🥇 💎 👑</div>
</div>

<div class="section-title">📋 请选择你的岗位</div>

<div class="game-list" id="gameList"></div>

<div class="stats-bar">
  <div>共 <span id="totalGames">0</span> 个岗位</div>
  <div>总题库 <span id="totalQuestions">0</span> 题</div>
</div>

<div class="footer">
  扫一次码，随时挑战 · 支持进度暂存 · 自动排名<br>
  石家庄明旺乳业有限公司
</div>

<script>
const GAMES = [
  {name:'调配岗', icon:'🥛', desc:'TBA19线调配岗位', file:'sop-game.html', port:8003, q:200},
  {name:'称量岗', icon:'⚖️', desc:'TBA19线称量岗位', file:'sop-game-weigh-v2.html', port:8018, q:150},
  {name:'备料岗', icon:'📋', desc:'TBA19线备料岗位', file:'sop-game-prep.html', port:8004, q:150},
  {name:'杀菌岗', icon:'🔥', desc:'TBA19线杀菌岗位', file:'sop-game-sterilize.html', port:8005, q:200},
  {name:'小字喷印岗', icon:'🖨️', desc:'TBA19线小字体喷印岗位', file:'sop-game-print.html', port:8006, q:150},
  {name:'充填岗', icon:'📦', desc:'TBA19线充填岗位', file:'sop-game-fill.html', port:8007, q:200},
  {name:'贴管岗', icon:'📌', desc:'TBA19线贴管岗位', file:'sop-game-stick.html', port:8008, q:150},
  {name:'多包收缩岗', icon:'🎁', desc:'TBA19线多包收缩岗位', file:'sop-game-multi.html', port:8009, q:150},
  {name:'装箱岗', icon:'📦', desc:'TBA19线装箱岗位', file:'sop-game-box.html', port:8010, q:150},
  {name:'外箱喷印岗', icon:'🖨️', desc:'TBA19线外箱喷印岗位', file:'sop-game-outer.html', port:8011, q:150},
  {name:'全箱收缩岗', icon:'📐', desc:'TBA19线全箱收缩岗位', file:'sop-game-shrink.html', port:8012, q:150},
  {name:'礼盒改装岗', icon:'🎀', desc:'TBA19线礼盒改装岗位', file:'sop-game-gift.html', port:8013, q:150},
  {name:'翻堆岗', icon:'🔄', desc:'TBA19线翻堆岗位', file:'sop-game-flip.html', port:8014, q:100},
  {name:'空调保养岗', icon:'❄️', desc:'空调系统保养岗位', file:'sop-game-ac.html', port:8015, q:150},
  {name:'净水处理岗', icon:'💧', desc:'净水处理岗位', file:'sop-game-water.html', port:8016, q:200},
  {name:'污水站岗', icon:'♻️', desc:'污水站管理岗位', file:'sop-game-sewage.html', port:8017, q:150},
  {name:'品检岗', icon:'🔍', desc:'TBA19线品检岗位', file:'sop-game-qc.html', port:8020, q:200},
];

// 动态生成URL
const BASE = location.href.replace(/\/[^\/]*$/, '/');

function renderList() {
  const list = document.getElementById('gameList');
  let totalQ = 0;
  
  list.innerHTML = GAMES.map(g => {
    totalQ += g.q;
    const badgeClass = g.q >= 200 ? 'badge-200' : g.q >= 150 ? 'badge-150' : 'badge-100';
    const url = BASE + g.file;
    return `<a class="game-card" href="${url}">
      <div class="icon">${g.icon}</div>
      <div class="info">
        <div class="name">${g.name}</div>
        <div class="desc">${g.desc}</div>
      </div>
      <span class="badge ${badgeClass}">${g.q}题</span>
      <span class="arrow">▶</span>
    </a>`;
  }).join('');
  
  document.getElementById('totalGames').textContent = GAMES.length;
  document.getElementById('totalQuestions').textContent = totalQ;
}

renderList();
</script>
</body>
</html>

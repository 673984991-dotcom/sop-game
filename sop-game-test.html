<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SOP闯关游戏 - 调配岗 - 石家庄明旺乳业</title>
<style>
:root {
  --bg: #1a1a2e;
  --bg2: #16213e;
  --card: #0f3460;
  --gold: #f0b90b;
  --text: #e8e8f0;
  --text2: #b0b8d0;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: sans-serif;
  background: #1a1a2e;
  color: var(--text);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  padding: 20px;
}
.page { display:none; }
.page.active { display:block; }
.user-area { background: var(--card); border-radius: var(--radius); padding:20px; text-align:center; }
.user-area input { width:100%; padding:12px; margin-bottom:10px; font-size:16px; text-align:center; }
.user-area button { width:100%; padding:12px; font-size:16px; background:var(--gold); border:none; border-radius:8px; font-weight:bold; }
</style>
</head>
<body>

<div class="page active" id="pageHome">
  <div style="text-align:center;padding:30px 0;color:var(--gold);font-size:24px;">SOP闯关游戏</div>
  <div class="user-area">
    <input type="text" id="userName" placeholder="请输入你的姓名" maxlength="10">
    <button onclick="alert('按钮有反应！姓名：' + document.getElementById('userName').value)">⚔️ 开始闯关</button>
  </div>
</div>

</body>
</html>
